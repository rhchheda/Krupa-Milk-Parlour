<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Partner Login — Manish Milk Parlour</title>
<link rel="stylesheet" href="milk-style.css">
</head>
<body>

<div class="mp-topbar">
  <a href="index.html" class="logo"><span>🥛</span> Manish Milk Parlour</a>
</div>

<div class="mp-container-sm">
  <div class="mp-login-box">
    <div class="login-logo">🛵</div>
    <h2>Delivery Partner Login</h2>
    <p class="login-sub">Enter your Partner ID and password</p>

    <div class="mp-form-group" style="text-align:left;">
      <label class="mp-label">🪪 Partner ID</label>
      <input class="mp-input" type="text" id="personId" placeholder="e.g. DP001" autocomplete="username">
    </div>

    <div class="mp-form-group" style="text-align:left;">
      <label class="mp-label">🔒 Password</label>
      <div style="position:relative;">
        <input class="mp-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" style="padding-right:44px;">
        <button type="button" onclick="togglePwd()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;" id="eyeBtn">👁️</button>
      </div>
    </div>

    <div id="loginError" class="mp-alert mp-alert-danger" style="display:none;"></div>

    <button class="mp-btn mp-btn-accent mp-btn-lg" id="loginBtn" onclick="doLogin()">Login</button>

    <hr style="margin:24px 0;border:none;border-top:1px solid var(--border);">
    <a href="index.html" style="font-size:13px;color:var(--primary);">← Back to Home</a>
  </div>
</div>

<script src="milk-app.js"></script>
<script>
  if (getSession('mp_delivery')) window.location.href = 'delivery-app.html';

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function togglePwd() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    document.getElementById('eyeBtn').textContent = inp.type === 'password' ? '👁️' : '🙈';
  }

  async function doLogin() {
    const personId = document.getElementById('personId').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('loginError');
    errEl.style.display = 'none';

    if (!personId) { errEl.textContent = 'Please enter your Partner ID.'; errEl.style.display = 'flex'; return; }
    if (!password) { errEl.textContent = 'Please enter your password.';   errEl.style.display = 'flex'; return; }

    const btn = document.getElementById('loginBtn');
    setLoading(btn, true);
    try {
      const res = await apiGet({ action: 'deliveryLogin', personId, password });
      if (res.success) {
        saveSession('mp_delivery', { token: res.token, personId: res.personId, name: res.name });
        window.location.href = 'delivery-app.html';
      } else {
        errEl.textContent = res.error || 'Invalid Partner ID or password.';
        errEl.style.display = 'flex';
        setLoading(btn, false);
      }
    } catch (_) {
      errEl.textContent = 'Network error. Check your connection.';
      errEl.style.display = 'flex';
      setLoading(btn, false);
    }
  }
</script>
</body>
</html>
