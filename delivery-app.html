<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery App — Manish Milk Parlour</title>
<link rel="stylesheet" href="milk-style.css">
<style>
  .route-header {
    background: var(--primary);
    color: #fff;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .route-header .date-label { font-size: 13px; opacity: 0.8; }
  .route-header .progress-label { font-size: 15px; font-weight: 700; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
    background: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--text-muted); transition: all 0.2s;
  }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .cust-seq { width: 26px; height: 26px; background: var(--primary-light); color: var(--primary); border-radius: 50%; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cust-header { display: flex; align-items: flex-start; gap: 10px; }
  .cust-info { flex: 1; min-width: 0; }
  .delivered-stamp { background: var(--success); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; }
  .missed-stamp { background: var(--danger); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
</style>
</head>
<body>

<div class="mp-topbar">
  <a href="index.html" class="logo"><span>🥛</span> Milk Parlour</a>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="user-chip">🛵 <span id="personName">…</span></span>
    <button onclick="logout()" class="mp-btn mp-btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border:none;">Logout</button>
  </div>
</div>

<div class="mp-container-md">

  <!-- Route header -->
  <div class="route-header">
    <div>
      <div class="date-label" id="todayLabel">Today</div>
      <div class="progress-label" id="progressLabel">Loading route…</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:22px;font-weight:800;" id="progressCount">—</div>
      <div style="font-size:12px;opacity:0.8;">completed</div>
    </div>
  </div>
  <div class="mp-progress"><div class="mp-progress-bar" id="progressBar" style="width:0%"></div></div>

  <!-- Filters -->
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('delivered',this)">Delivered</button>
    <button class="filter-btn" onclick="setFilter('missed',this)">Missed</button>
  </div>

  <div id="routeList">
    <div class="mp-empty"><span class="empty-icon">⏳</span><p>Loading today's route…</p></div>
  </div>

</div>

<!-- Mark Delivery Modal -->
<div class="mp-modal-overlay" id="markModal">
  <div class="mp-modal">
    <button class="mp-modal-close" onclick="closeModal()">✕</button>
    <div class="mp-modal-title" id="modalTitle">Mark Delivery</div>

    <input type="hidden" id="modalCustId">
    <input type="hidden" id="modalCustName">

    <div class="mp-form-group">
      <label class="mp-label">🥛 Brand</label>
      <select class="mp-select" id="modalBrand"></select>
    </div>

    <div class="mp-form-group">
      <label class="mp-label">⭐ Quality</label>
      <select class="mp-select" id="modalQuality"></select>
    </div>

    <div class="mp-form-group">
      <label class="mp-label">🥛 Milk Quantity (Litres)</label>
      <div class="mp-stepper">
        <button type="button" onclick="adjustQty('milk',-0.5)">−</button>
        <input type="number" id="modalMilkQty" value="1" min="0" max="10" step="0.5">
        <button type="button" onclick="adjustQty('milk',0.5)">+</button>
      </div>
    </div>

    <div class="mp-form-group">
      <label class="mp-label">🍦 Curd Quantity (Litres) <span style="font-weight:400;color:var(--text-muted);">optional</span></label>
      <div class="mp-stepper">
        <button type="button" onclick="adjustQty('curd',-0.25)">−</button>
        <input type="number" id="modalCurdQty" value="0" min="0" max="5" step="0.25">
        <button type="button" onclick="adjustQty('curd',0.25)">+</button>
      </div>
    </div>

    <div class="mp-form-group">
      <label class="mp-label">📝 Notes <span style="font-weight:400;color:var(--text-muted);">optional</span></label>
      <input class="mp-input" type="text" id="modalNotes" placeholder="e.g. Left at door, customer absent…">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;">
      <button class="mp-btn mp-btn-success" id="btnDelivered" onclick="submitMark('Delivered')">✅ Delivered</button>
      <button class="mp-btn mp-btn-danger"  id="btnMissed"    onclick="submitMark('Missed')">❌ Not Delivered</button>
    </div>
  </div>
</div>

<script src="milk-app.js"></script>
<script>
const sess = getSession('mp_delivery');
if (!sess) window.location.href = 'delivery-login.html';

document.getElementById('personName').textContent = sess.name || 'Partner';

let allRoute = [];
let activeFilter = 'all';
let brands = [];
const brandQualityMap = {};

// Load prices to populate brand/quality options
async function loadBrands() {
  try {
    const res = await apiGet({ action: 'getPrices', token: sess.token });
    if (res.success) {
      res.prices.forEach(p => {
        if (!brandQualityMap[p.brand]) brandQualityMap[p.brand] = [];
        if (!brandQualityMap[p.brand].includes(p.quality)) brandQualityMap[p.brand].push(p.quality);
      });
      brands = Object.keys(brandQualityMap);
    }
  } catch (_) {}
}

async function loadRoute() {
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  document.getElementById('todayLabel').textContent = today.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long' });

  try {
    const res = await apiGet({ action: 'getRoute', token: sess.token, date: todayStr });
    if (!res.success) { if (res.error === 'Unauthorised') logout(); return; }
    allRoute = res.route || [];
    updateProgress();
    renderRoute();
  } catch (_) {
    document.getElementById('routeList').innerHTML = '<div class="mp-alert mp-alert-danger">Failed to load route. Check your connection.</div>';
  }
}

function updateProgress() {
  const total     = allRoute.length;
  const delivered = allRoute.filter(c => c.todayStatus?.status === 'Delivered').length;
  const missed    = allRoute.filter(c => c.todayStatus?.status === 'Missed').length;
  const done      = delivered + missed;
  document.getElementById('progressLabel').textContent = `${delivered} delivered · ${missed} missed · ${total - done} pending`;
  document.getElementById('progressCount').textContent = `${done}/${total}`;
  document.getElementById('progressBar').style.width = total ? (done/total*100)+'%' : '0%';
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRoute();
}

function renderRoute() {
  let list = allRoute;
  if (activeFilter === 'pending')   list = list.filter(c => !c.todayStatus);
  if (activeFilter === 'delivered') list = list.filter(c => c.todayStatus?.status === 'Delivered');
  if (activeFilter === 'missed')    list = list.filter(c => c.todayStatus?.status === 'Missed');

  if (!list.length) {
    document.getElementById('routeList').innerHTML = '<div class="mp-empty"><span class="empty-icon">🎉</span><p>' +
      (activeFilter === 'pending' ? 'All deliveries done for today!' : 'No entries in this filter.') + '</p></div>';
    return;
  }

  let html = '';
  list.forEach((c, i) => {
    const status = c.todayStatus?.status;
    const cardCls = status === 'Delivered' ? 'delivered' : status === 'Missed' ? 'missed' : 'pending';
    let statusHtml = '';
    if (status === 'Delivered') statusHtml = `<span class="delivered-stamp">✓ Delivered at ${c.todayStatus.time || ''}</span>`;
    else if (status === 'Missed') statusHtml = `<span class="missed-stamp">✗ Not Delivered</span>`;

    // Use customer-requested order if placed before cutoff, else fall back to default
    const req = c.requestedOrder;
    const activeBrand   = req ? req.brand   : c.defaultBrand;
    const activeQuality = req ? req.quality : c.defaultQuality;
    const activeMilkQty = req ? req.milkQty : c.defaultMilkQty;
    const activeCurdQty = req ? req.curdQty : c.defaultCurdQty;
    const reqBadge = req
      ? `<div style="margin-top:5px;display:inline-flex;align-items:center;gap:4px;background:#e3f2fd;color:#0d47a1;font-size:11px;font-weight:600;padding:2px 9px;border-radius:12px;">✏️ Requested: ${req.brand} ${req.milkQty}L${req.curdQty > 0 ? ' + '+req.curdQty+'L curd' : ''}</div>`
      : '';

    html += `<div class="mp-delivery-card ${cardCls}" data-id="${c.customerId}">
      <div class="cust-header">
        <div class="cust-seq">${allRoute.indexOf(c)+1}</div>
        <div class="cust-info">
          <div class="cust-name">${c.name}</div>
          <div class="cust-addr">📍 ${c.address || '—'}</div>
          <div class="cust-default">🥛 ${req ? '<strong style="color:var(--primary);">Today\'s Order</strong>' : 'Default'}: ${activeBrand} ${activeQuality} · ${activeMilkQty}L${activeCurdQty > 0 ? ` · Curd ${activeCurdQty}L` : ''}</div>
          ${reqBadge}
          ${statusHtml ? `<div style="margin-top:8px;">${statusHtml}</div>` : ''}
        </div>
      </div>
      <div class="cust-actions">
        <button class="mp-btn mp-btn-primary mp-btn-sm" onclick="openModal('${c.customerId}','${c.name.replace(/'/g,"\\'")}','${activeBrand}','${activeQuality}',${activeMilkQty},${activeCurdQty})">
          ${status ? '✏️ Update' : '📦 Mark Delivery'}
        </button>
        ${c.phone ? `<a href="tel:${c.phone}" class="mp-btn mp-btn-outline mp-btn-sm">📞 Call</a>` : ''}
      </div>
    </div>`;
  });
  document.getElementById('routeList').innerHTML = html;
}

function openModal(custId, custName, brand, quality, milkQty, curdQty) {
  document.getElementById('modalCustId').value   = custId;
  document.getElementById('modalCustName').value = custName;
  document.getElementById('modalTitle').textContent = '📦 ' + custName;
  document.getElementById('modalMilkQty').value  = milkQty || 1;
  document.getElementById('modalCurdQty').value  = curdQty || 0;
  document.getElementById('modalNotes').value    = '';

  // Populate brand dropdown
  const brandSel = document.getElementById('modalBrand');
  brandSel.innerHTML = '';
  const allBrands = brands.length ? brands : ['Amul','Nandini','Kolhapur','Mother Dairy','Aditya'];
  allBrands.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    if (b === brand) opt.selected = true;
    brandSel.appendChild(opt);
  });
  populateQuality(brand, quality);
  brandSel.onchange = () => populateQuality(brandSel.value, '');

  document.getElementById('markModal').classList.add('open');
}

function populateQuality(brand, selectedQuality) {
  const qualSel = document.getElementById('modalQuality');
  qualSel.innerHTML = '';
  const qualities = brandQualityMap[brand] || ['Gold','Taza','Regular','Toned'];
  qualities.forEach(q => {
    const opt = document.createElement('option');
    opt.value = q; opt.textContent = q;
    if (q === selectedQuality) opt.selected = true;
    qualSel.appendChild(opt);
  });
}

function adjustQty(field, delta) {
  const inp = document.getElementById(field === 'milk' ? 'modalMilkQty' : 'modalCurdQty');
  const step = field === 'milk' ? 0.5 : 0.25;
  let val = parseFloat(inp.value || 0) + delta;
  val = Math.max(0, Math.round(val / step) * step);
  inp.value = val;
}

function closeModal() { document.getElementById('markModal').classList.remove('open'); }
document.getElementById('markModal').addEventListener('click', e => { if (e.target === document.getElementById('markModal')) closeModal(); });

async function submitMark(status) {
  const custId   = document.getElementById('modalCustId').value;
  const brand    = document.getElementById('modalBrand').value;
  const quality  = document.getElementById('modalQuality').value;
  const milkQty  = parseFloat(document.getElementById('modalMilkQty').value) || 0;
  const curdQty  = parseFloat(document.getElementById('modalCurdQty').value) || 0;
  const notes    = document.getElementById('modalNotes').value.trim();

  const btnId = status === 'Delivered' ? 'btnDelivered' : 'btnMissed';
  const btn   = document.getElementById(btnId);
  setLoading(btn, true);

  try {
    const res = await apiPost('markDelivered', { customerId: custId, brand, quality, milkQty, curdQty, status, notes }, sess.token);
    if (res.success) {
      // Update local route data
      const cust = allRoute.find(c => String(c.customerId) === String(custId));
      if (cust) {
        const now = new Date();
        const time = now.toTimeString().slice(0,5);
        cust.todayStatus = { status, time };
      }
      closeModal();
      updateProgress();
      renderRoute();
      showToast(status === 'Delivered' ? '✅ Delivery marked!' : '❌ Marked as not delivered', status === 'Delivered' ? 'success' : 'error');
    } else {
      showToast(res.error || 'Failed to save. Try again.', 'error');
      setLoading(btn, false);
    }
  } catch (_) {
    showToast('Network error. Try again.', 'error');
    setLoading(btn, false);
  }
}

function logout() { clearSession('mp_delivery'); window.location.href = 'delivery-login.html'; }

loadBrands().then(() => loadRoute());
</script>
</body>
</html>
