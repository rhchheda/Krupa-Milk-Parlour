<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login — Manish Milk Parlour</title>
<link rel="stylesheet" href="milk-style.css">
</head>
<body>

<div class="mp-topbar">
  <a href="index.html" class="logo"><span>🥛</span> Manish Milk Parlour</a>
</div>

<div id="dryRunBanner" class="mp-dry-run-banner" style="display:none;">
  🧪 Dry Run Mode Active
</div>

<div class="mp-container-sm">
  <div class="mp-login-box">
    <div class="login-logo">🥛</div>
    <h2>Customer Login</h2>
    <p class="login-sub">Enter your registered mobile number and 6-digit PIN</p>

    <div class="mp-form-group" style="text-align:left;">
      <label class="mp-label">📞 Mobile Number</label>
      <input class="mp-input" type="tel" id="phone" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric">
    </div>

    <div class="mp-form-group" style="text-align:left;">
      <label class="mp-label" style="text-align:center;display:block;">🔑 6-Digit PIN</label>
      <div class="mp-pin-group" id="pinGroup">
        <input class="mp-pin-digit" type="password" maxlength="1" inputmode="numeric" data-index="0">
        <input class="mp-pin-digit" type="password" maxlength="1" inputmode="numeric" data-index="1">
        <input class="mp-pin-digit" type="password" maxlength="1" inputmode="numeric" data-index="2">
        <input class="mp-pin-digit" type="password" maxlength="1" inputmode="numeric" data-index="3">
        <input class="mp-pin-digit" type="password" maxlength="1" inputmode="numeric" data-index="4">
        <input class="mp-pin-digit" type="password" maxlength="1" inputmode="numeric" data-index="5">
      </div>
    </div>

    <div id="loginError" class="mp-alert mp-alert-danger" style="display:none;text-align:left;"></div>

    <button class="mp-btn mp-btn-primary mp-btn-lg" id="loginBtn" onclick="doLogin()">Login to My Account</button>

    <p style="font-size:13px;color:var(--text-muted);margin-top:20px;">
      Don't have a PIN? Contact your milk delivery person or admin to get access.
    </p>

    <hr style="margin:20px 0;border:none;border-top:1px solid var(--border);">
    <a href="index.html" style="font-size:13px;color:var(--primary);">← Back to Home</a>
  </div>
</div>

<script src="milk-app.js"></script>
<script>
  // If already logged in, redirect
  if (getSession('mp_customer')) window.location.href = 'dashboard.html';

  apiGet({ action: 'getConfig' }).then(cfg => {
    if (cfg.dryRunMode) document.getElementById('dryRunBanner').style.display = 'block';
  }).catch(() => {});

  // PIN digit auto-advance
  const digits = document.querySelectorAll('.mp-pin-digit');
  digits.forEach((d, i) => {
    d.addEventListener('input', () => {
      d.value = d.value.replace(/\D/g, '');
      if (d.value && i < 5) digits[i + 1].focus();
      if (digits[5].value) document.getElementById('loginBtn').focus();
    });
    d.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !d.value && i > 0) digits[i - 1].focus();
    });
  });

  // Allow paste on first digit
  digits[0].addEventListener('paste', e => {
    e.preventDefault();
    const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
    paste.split('').forEach((ch, i) => { if (digits[i]) digits[i].value = ch; });
    if (digits[paste.length - 1]) digits[paste.length - 1].focus();
  });

  // Enter key submits
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const phone = document.getElementById('phone').value.trim();
    const pin = Array.from(digits).map(d => d.value).join('');
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';

    if (!/^\d{10}$/.test(phone)) {
      errEl.textContent = 'Please enter a valid 10-digit mobile number.';
      errEl.style.display = 'flex';
      document.getElementById('phone').focus();
      return;
    }
    if (pin.length !== 6) {
      errEl.textContent = 'Please enter all 6 digits of your PIN.';
      errEl.style.display = 'flex';
      digits[0].focus();
      return;
    }

    const btn = document.getElementById('loginBtn');
    setLoading(btn, true);

    try {
      const res = await apiGet({ action: 'customerLogin', phone, pin });
      if (res.success) {
        saveSession('mp_customer', { token: res.token, customerId: res.customerId, name: res.name });
        window.location.href = 'dashboard.html';
      } else {
        errEl.textContent = res.error || 'Invalid mobile number or PIN. Please try again.';
        errEl.style.display = 'flex';
        digits.forEach(d => d.value = '');
        digits[0].focus();
        setLoading(btn, false);
      }
    } catch (_) {
      errEl.textContent = 'Network error. Please check your connection and try again.';
      errEl.style.display = 'flex';
      setLoading(btn, false);
    }
  }
</script>
</body>
</html>
